# .goreleaser.yaml
# Build configuration for cyoda-go releases. Triggered by the release.yml
# workflow on v* tags.

version: 2

project_name: cyoda

before:
  hooks:
    - env GOWORK=off go mod download
    - env GOWORK=off go mod verify
    - bash -c 'mkdir -p .release-extras && tar -czf ".release-extras/cyoda_help_{{ .Version }}.tar.gz" -C cmd/cyoda/help content'
    # `go run` does not apply the `builds:` ldflags, so stamp main.version
    # explicitly — otherwise the emitted JSON ships with main.version="dev"
    # instead of the tagged version (issue #101).
    - bash -c 'go run -ldflags="-X main.version={{ .Version }}" ./cmd/cyoda help --format=json > ".release-extras/cyoda_help_{{ .Version }}.json"'

builds:
  - id: cyoda
    main: ./cmd/cyoda
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: cyoda
    ids: [cyoda]
    # Archive contents are flat at the top level (no wrapping subdir). scripts/install.sh
    # relies on this shape when extracting the binary; pin it explicitly so a future
    # GoReleaser default change doesn't silently break the installer.
    wrap_in_directory: false
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: cyoda
    package_name: cyoda
    vendor: Cyoda Platform
    homepage: https://github.com/cyoda-platform/cyoda-go
    maintainer: Cyoda Platform <noreply@cyoda.com>
    description: Lightweight Go EDBMS — digital twin of the Cyoda platform.
    license: Apache-2.0
    formats: [deb, rpm]
    bindir: /usr/bin
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: scripts/packaging/cyoda.env
        dst: /etc/cyoda/cyoda.env
        type: "config|noreplace"

# Intentionally using `brews:` despite deprecation warning.
# cyoda is a CLI (not a .app), supports Linux Homebrew, and relies on
# formula post_install hooks. Revisit if GoReleaser v3 removes `brews:`.
brews:
  - name: cyoda
    # Skip tap upload on prerelease tags (v*-rc.*, v*-beta.*, v*-alpha.*).
    # Snapshots never upload regardless (snapshot mode short-circuits
    # publishers). Stable tags (v0.1.0) commit to the tap as usual. Matches
    # the :latest image-tag policy and the bump-chart-appversion prerelease
    # filter.
    skip_upload: auto
    repository:
      owner: cyoda-platform
      name: homebrew-cyoda-go
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/cyoda-platform/cyoda-go
    description: Lightweight Go EDBMS — digital twin of the Cyoda platform
    license: Apache-2.0
    commit_author:
      name: cyoda-go-release-bot
      email: noreply@cyoda.com
    install: |
      bin.install "cyoda"
    test: |
      system bin/"cyoda", "--help"
    # No post_install: Homebrew sandboxes post_install and denies writes to
    # $HOME, so `cyoda init` always failed on macOS and emitted a warning on
    # every install. The caveats block below already tells users how to run
    # init when they want to (issue #96).
    caveats: |
      ==============================================================
      cyoda is installed but not yet initialised. Run:

        cyoda init

      to write the default sqlite configuration to
      #{Dir.home}/.config/cyoda/ with data stored in
      #{Dir.home}/.local/share/cyoda/cyoda.db.

      Alternatively, set CYODA_STORAGE_BACKEND and related env vars
      in your shell environment to run without an on-disk config.
      ==============================================================

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256
  extra_files:
    - glob: ./.release-extras/cyoda_help_*.tar.gz
    - glob: ./.release-extras/cyoda_help_*.json

dockers_v2:
  - id: cyoda
    images:
      - ghcr.io/cyoda-platform/cyoda
    tags:
      - "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: deploy/docker/Dockerfile
    labels:
      org.opencontainers.image.source: https://github.com/cyoda-platform/cyoda-go
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .Commit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: Apache-2.0

  - id: cyoda-latest
    images:
      - ghcr.io/cyoda-platform/cyoda
    tags:
      - latest
    # `:latest` tracks stable releases only — skip for prereleases.
    # In goreleaser v2 the dockers_v2 equivalent of v1's skip_push is
    # `disable` (truthy template string disables the whole image).
    disable: "{{ .Prerelease }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: deploy/docker/Dockerfile
    labels:
      org.opencontainers.image.source: https://github.com/cyoda-platform/cyoda-go
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .Commit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.licenses: Apache-2.0

docker_signs:
  # `dockers_v2` produces per-arch `Docker Image` artifacts (one per
  # platform — linux/amd64, linux/arm64, ...). There is no separate
  # `docker_manifests:` block and the v2 publish path assembles the
  # multi-arch manifest list transparently from those per-arch images.
  # Sign the images themselves: cosign signs each per-arch digest,
  # multi-arch pulls resolve to a signed image, and the snapshot smoke
  # can verify the signer's selector resolves non-empty.
  - artifacts: images
    cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"

sboms:
  - artifacts: archive

release:
  prerelease: auto
  draft: false
  extra_files:
    - glob: ./.release-extras/cyoda_help_*.tar.gz
    - glob: ./.release-extras/cyoda_help_*.json
    # Publish install.sh as a release asset so the canonical install URL
    # is `/releases/latest/download/install.sh` — pinned per-release rather
    # than tracking `main` (issue #49).
    - glob: ./scripts/install.sh
