name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write    # GitHub Release + tag annotations
  packages: write    # GHCR push
  id-token: write    # keyless cosign via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pre-flight: verify that no cyoda-platform/* module resolves to a
      # pseudo-version (which would mean the release ships unreleased code)
      # and that no external module is diverted via a replace directive
      # (which would break reproducibility for downstream consumers).
      #
      # The check is implemented in Go at cmd/release-preflight so it has
      # unit tests covering all three pseudo-version forms and the single-
      # line + block replace syntaxes. Upstream pseudo-versions and
      # in-repo local-path replaces (./plugins/*) are both legitimate and
      # tolerated.
      - name: Pre-flight — verify module dependencies
        run: |
          set -euo pipefail
          GOWORK=off go mod download
          GOWORK=off go mod verify
          echo "Plugin dependency versions pinned by go.mod:"
          GOWORK=off go list -m github.com/cyoda-platform/cyoda-go/plugins/... || true
          go run ./cmd/release-preflight --go-mod go.mod --org github.com/cyoda-platform/

      - name: Guard — Dockerfile must exist
        run: |
          if [ ! -f deploy/docker/Dockerfile ]; then
            echo "ERROR: deploy/docker/Dockerfile not found."
            echo "The canonical Dockerfile is produced by the Docker per-target plan."
            echo "A v* release tag cannot be built until that artifact lands. Aborting."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - uses: anchore/sbom-action/download-syft@v0

      - name: Generate Homebrew tap token
        id: homebrew-tap-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_KEY }}
          owner: cyoda-platform
          repositories: homebrew-cyoda-go

      - uses: goreleaser/goreleaser-action@v7
        with:
          # Pin to latest v2.x.y. Accepts patches and minor features; blocks
          # v3 breaking changes from silently breaking the release pipeline.
          # Bump intentionally when a new major warrants validation.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOWORK: "off"
          HOMEBREW_TAP_TOKEN: ${{ steps.homebrew-tap-token.outputs.token }}
          # Force goreleaser to use the tag that triggered this run.
          # Without this, goreleaser's default `git describe` resolution
          # can pick the wrong tag when multiple tags point at the same
          # commit — e.g. picking v0.6.0-rc.1 over v0.6.0 when both tag
          # the same HEAD. github.ref_name is authoritative for the
          # tag that fired the workflow.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Post-build image scan (issue #67). Scans the GHCR image goreleaser
      # just pushed for OS-package and third-party CVEs. Advisory at release
      # time: we do not gate the already-pushed tag on findings, but the
      # report is surfaced to the job summary so maintainers can triage.
      # Gating lives in CI (govulncheck) which runs pre-merge.
      #
      # goreleaser's `{{ .Version }}` strips the leading `v`, so tag `v1.2.3`
      # produces image `ghcr.io/cyoda-platform/cyoda:1.2.3`. Derive the image
      # ref accordingly.
      - name: Compute image ref for scan
        id: image-ref
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "ref=ghcr.io/cyoda-platform/cyoda:${version}" >> "$GITHUB_OUTPUT"

      - name: Scan release image (Trivy)
        # Pin to >= v0.35.0; earlier versions are covered by
        # GHSA-69fq-xp46-6x23 (briefly-compromised supply chain).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image-ref.outputs.ref }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          output: trivy-report.txt

      - name: Publish Trivy report to job summary
        if: always()
        run: |
          {
            echo "## Trivy image scan — \`${{ steps.image-ref.outputs.ref }}\`"
            echo ""
            echo '```'
            cat trivy-report.txt 2>/dev/null || echo "(no report produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
