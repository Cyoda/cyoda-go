name: CI

on:
  push:
    branches: [develop, main, 'release/**']
  pull_request:
    branches: [develop, main, 'release/**']
  workflow_dispatch:

# Default to read-only token for all jobs. Individual jobs may opt-in to
# additional scopes if they need them; none currently do.
permissions:
  contents: read

env:
  # Disable testcontainers' Ryuk resource-reaper in CI. Its handshake over
  # IPv6 loopback intermittently resets ("Reaper handshake failed: connection
  # reset by peer"), after which Ryuk reaps the still-in-use postgres container
  # mid-test — surfacing as SQLSTATE 57P01 ("unexpected postmaster exit") and
  # failing the whole parity/e2e suite. Ryuk only matters for cleaning up
  # leaked containers when a test process dies; on ephemeral CI runners the VM
  # is discarded after the job and the fixtures already call Terminate()
  # explicitly, so the reaper is pure downside here.
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -v

      # Race detector. Scoped via `make race` to exclude `internal/e2e` —
      # see Makefile and `.claude/rules/race-testing.md` for rationale.
      # The same target runs locally pre-PR, so local and CI agree.
      - name: Run tests with race detector
        run: make race

      # Plugin submodules each have their own go.mod, so `./...` from the root
      # does not recurse into them. Run tests inside each module so CI does
      # not miss regressions (issue #46). Postgres plugin uses testcontainers-go;
      # ubuntu-latest provides the Docker socket.
      - name: Run plugins/memory tests
        working-directory: plugins/memory
        run: go test -v ./...

      - name: Run plugins/sqlite tests
        working-directory: plugins/sqlite
        run: go test -v ./...

      - name: Run plugins/postgres tests
        working-directory: plugins/postgres
        run: go test -v ./...

      - name: Build
        run: go build -o bin/cyoda ./cmd/cyoda

  # Hygiene: each module must be independently buildable with workspace mode off.
  # Ensures plugin modules' go.mod files declare all dependencies — the workspace
  # silently patches over missing requires, which would break downstream consumers
  # (cyoda-go-cassandra).
  per-module-hygiene:
    runs-on: ubuntu-latest
    # Plan 3 note: this job will fail against cyoda-go-spi v0.1.0 because
    # Plan 3 adds StoreFactory.TransactionManager(ctx) and Plugin.NewFactory(ctx).
    # Plan 4 tags cyoda-go-spi v0.2.0 and this job becomes required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and vet cyoda (root) with GOWORK=off
        run: |
          GOWORK=off go build ./...
          GOWORK=off go vet ./...

      - name: Build and vet plugins/memory with GOWORK=off
        working-directory: plugins/memory
        run: |
          GOWORK=off go build ./...
          GOWORK=off go vet ./...

      - name: Build and vet plugins/postgres with GOWORK=off
        working-directory: plugins/postgres
        run: |
          GOWORK=off go build ./...
          GOWORK=off go vet ./...

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck scripts/install.sh scripts/dev/run-docker-dev.sh scripts/check-spi-pin-sync.sh scripts/check-spi-pin-sync_test.sh scripts/check-generated-in-sync.sh

  # Continuous security gates (issue #67):
  #   - govulncheck scans the call graph for exploitable stdlib and third-party CVEs,
  #     covering the root module and each plugin submodule (they have their own go.mod
  #     and are independently consumable, so each must be scanned separately).
  #   - dependency-review-action blocks PRs that introduce known-vulnerable deps
  #     before they land.
  # Both gates are blocking: merging past a vulnerability finding is not allowed.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pinned binary for CI reproducibility. The vulnerability database itself is
      # fetched at scan time, so pinning the tool does not pin the findings.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: govulncheck (root)
        run: govulncheck ./...

      - name: govulncheck (plugins/memory)
        working-directory: plugins/memory
        run: govulncheck ./...

      - name: govulncheck (plugins/postgres)
        working-directory: plugins/postgres
        run: govulncheck ./...

      - name: govulncheck (plugins/sqlite)
        working-directory: plugins/sqlite
        run: govulncheck ./...

      # dependency-review is only meaningful on PR events (it compares base↔head).
      # Push events to main/develop skip this step — the govulncheck above still runs.
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  pin-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Verify SPI pin sync
        run: ./scripts/check-spi-pin-sync.sh

  # Guards against api/generated.go drifting from api/openapi.yaml — an edit to
  # the spec that isn't followed by `go generate ./api/...`. This drift went
  # undetected across several PRs (the spec changed; generated.go did not), so
  # this gate regenerates and fails on any diff.
  codegen-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify api/generated.go is in sync with api/openapi.yaml
        run: make check-codegen
