name: Release smoke

on:
  pull_request:
    paths:
      - '.goreleaser.yaml'
      - 'deploy/docker/Dockerfile'
      - 'cmd/cyoda/**'
      - '.github/workflows/release-smoke.yml'
  push:
    branches: [main]
    paths:
      - '.goreleaser.yaml'
      - 'deploy/docker/Dockerfile'
      - 'cmd/cyoda/**'
      - '.github/workflows/release-smoke.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0   # GoReleaser needs full history to derive version metadata

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Tag a non-prerelease snapshot version
        run: git tag v0.0.0

      - name: Run GoReleaser snapshot (no publish, no sign, no sbom)
        # Skipping sbom here avoids a dependency on anchore/sbom-action
        # at snapshot-verify time (its syft download has been flaky).
        # SBOM config is exercised on the real release path where syft
        # is installed via the release workflow's own step — config
        # bugs there surface at the first real release, which is
        # acceptable given SBOM config rarely changes.
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish --skip=sign --skip=sbom
        env:
          GOWORK: "off"

      - name: Verify docker_signs selector will resolve
        run: |
          python3 <<'PY'
          import json
          import sys

          with open('dist/artifacts.json') as f:
              artifacts = json.load(f)

          # `docker_signs: artifacts: images` in .goreleaser.yaml matches
          # the per-arch "Docker Image" artifacts that dockers_v2 produces
          # (one per platform). We expect at least two (amd64 + arm64) per
          # cyoda image id — so 4 total across the two ids (cyoda, cyoda-latest).
          signable = [a for a in artifacts if a.get('type') == 'Docker Image']

          if not signable:
              print("FAIL: docker_signs selector 'artifacts: images' will resolve to empty.")
              print("This means the first real release would ship unsigned images.")
              print("")
              print("All artifact types produced by this snapshot:")
              for a in artifacts:
                  print(f"  - {a.get('type', '?'):30s} {a.get('name', '?')}")
              print("")
              print("Fix: update .goreleaser.yaml's docker_signs.artifacts: selector")
              print("to match one of the type names above (or use 'all').")
              sys.exit(1)

          print(f"OK: {len(signable)} Docker Image artifact(s) — docker_signs will sign:")
          for a in signable:
              print(f"  - {a.get('name')}  ({a.get('type')})")
          PY

      - name: Verify :latest suppression behavior
        run: |
          # The :latest tag should be emitted on v0.0.0 (not a prerelease).
          # This catches regressions where dockers_v2 conditional-tag logic
          # misbehaves or where someone accidentally changes skip_push.
          python3 <<'PY'
          import json
          import sys

          with open('dist/artifacts.json') as f:
              artifacts = json.load(f)

          # Collect tag names from cyoda image artifacts.
          cyoda_tags = set()
          for a in artifacts:
              name = a.get('name', '')
              # Match ghcr.io/cyoda-platform/cyoda:TAG — take TAG.
              if ':' in name and 'cyoda-platform/cyoda' in name:
                  cyoda_tags.add(name.rsplit(':', 1)[1])

          print(f"cyoda image tags produced on v0.0.0 snapshot: {sorted(cyoda_tags)}")

          if 'latest' not in cyoda_tags and '0.0.0' not in cyoda_tags and 'v0.0.0' not in cyoda_tags:
              print("WARN: neither :latest nor :0.0.0/:v0.0.0 appeared — unexpected.")
              print("Not failing the job — GoReleaser may name tags differently —")
              print("but worth a human glance.")
          elif 'latest' not in cyoda_tags:
              print("WARN: :latest not emitted on a non-prerelease snapshot.")
              print("The dockers_v2 Pattern B (two-entry form with skip_push)")
              print("should produce :latest on v0.0.0. Investigate if this regresses.")
          else:
              print("OK: :latest emitted on non-prerelease, as expected.")
          PY

      - name: Assert help release assets generated
        run: |
          set -e
          echo "--- .release-extras contents ---"
          ls -la .release-extras/ 2>/dev/null || { echo "FAIL: .release-extras/ directory missing"; exit 1; }
          tar_file=$(ls .release-extras/cyoda_help_*.tar.gz 2>/dev/null | head -1)
          json_file=$(ls .release-extras/cyoda_help_*.json 2>/dev/null | head -1)
          test -n "$tar_file" || { echo "FAIL: cyoda_help_*.tar.gz missing from .release-extras/"; exit 1; }
          test -n "$json_file" || { echo "FAIL: cyoda_help_*.json missing from .release-extras/"; exit 1; }
          echo "Found: $tar_file"
          echo "Found: $json_file"

          echo "--- validate help JSON is well-formed ---"
          jq '.schema, .version, (.topics | length)' "$json_file" \
            || { echo "FAIL: help JSON is not valid or missing required fields"; exit 1; }

          echo "--- validate tar contents start with content/ ---"
          tar -tzf "$tar_file" | head -1 | grep -q '^content/' \
            || { echo "FAIL: help tarball root is not content/"; exit 1; }

          echo "--- validate SHA256SUMS covers both assets ---"
          test -f dist/SHA256SUMS || { echo "FAIL: dist/SHA256SUMS missing"; exit 1; }
          tar_basename=$(basename "$tar_file")
          json_basename=$(basename "$json_file")
          grep -q "$tar_basename" dist/SHA256SUMS \
            || { echo "FAIL: SHA256SUMS missing entry for $tar_basename"; exit 1; }
          grep -q "$json_basename" dist/SHA256SUMS \
            || { echo "FAIL: SHA256SUMS missing entry for $json_basename"; exit 1; }

          echo "OK: help assets generated and checksummed."
