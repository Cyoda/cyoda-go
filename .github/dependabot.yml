version: 2
updates:
  # Root Go module
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # The cyoda-go-spi pin is a maintainer-owned coordinated-release step
    # (MAINTAINING.md "Coordinated release across sibling repos"), not a routine
    # bump. Ignoring it keeps the grouped third-party PRs from being entangled
    # with — and mass-closed alongside — an unresolvable SPI pin mid-milestone.
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Plugin submodules each have their own go.mod and are independently
  # consumable, so each must be tracked separately.
  - package-ecosystem: gomod
    directory: "/plugins/memory"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: "/plugins/sqlite"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: "/plugins/postgres"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Container base image. Tracks the digest pin in deploy/docker/Dockerfile
  # so distroless/static base updates surface as PRs.
  - package-ecosystem: docker
    directory: "/deploy/docker"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
