version: 2

# target-branch is set per-entry to the active release branch so Dependabot
# PRs land directly on the release branch during a release cycle (rather
# than `main`, which would require manual retargeting + rebase — see
# .claude/memory note "Dependabot PRs during a release cycle").
#
# Maintenance: when a release branch merges and is deleted, update every
# `target-branch:` below to the next active release branch, or remove the
# field entirely (PRs revert to the default branch). Leaving a stale
# branch name here makes future Dependabot runs fail silently.

updates:
  # Root Go module
  - package-ecosystem: gomod
    directory: "/"
    target-branch: "release/v0.8.0"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # The cyoda-go-spi pin is a maintainer-owned coordinated-release step
    # (MAINTAINING.md "Coordinated release across sibling repos"), not a routine
    # bump. Ignoring it keeps the grouped third-party PRs from being entangled
    # with — and mass-closed alongside — an unresolvable SPI pin mid-milestone.
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Plugin submodules each have their own go.mod and are independently
  # consumable, so each must be tracked separately.
  - package-ecosystem: gomod
    directory: "/plugins/memory"
    target-branch: "release/v0.8.0"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: "/plugins/sqlite"
    target-branch: "release/v0.8.0"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: "/plugins/postgres"
    target-branch: "release/v0.8.0"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "github.com/cyoda-platform/cyoda-go-spi"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Container base image. Tracks the digest pin in deploy/docker/Dockerfile
  # so distroless/static base updates surface as PRs.
  - package-ecosystem: docker
    directory: "/deploy/docker"
    target-branch: "release/v0.8.0"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "release/v0.8.0"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
