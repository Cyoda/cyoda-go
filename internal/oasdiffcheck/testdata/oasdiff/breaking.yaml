openapi: 3.1.0
info:
  title: Fixture API
  version: 0.0.1
paths:
  /items/{id}:
    get:
      operationId: getItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            # BREAKING vs base.yaml: request path-parameter type narrowed
            # string -> integer. oasdiff classifies this as a breaking change.
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
